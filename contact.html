<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <!-- Le menu de navigation -->

        <a href="apropos.html" class="lien-nav">À propos</a>

    <h1>Contactez-moi</h1>
    
    <!-- Le formulaire -->
    <form style="max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px;">
        <input type="text" placeholder="Votre Nom" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <input type="email" placeholder="Votre Email" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <textarea placeholder="Votre message" rows="5" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
        <button type="submit" style="padding: 10px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Envoyer</button>
    </form>
</body>
